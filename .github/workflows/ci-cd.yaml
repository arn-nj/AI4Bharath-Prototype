# ==========================================================================
# CI/CD Pipeline — E-Waste Asset Lifecycle Optimizer
# ==========================================================================
#
# Triggers:
#   - push to main / develop
#   - pull_request to main
#
# Jobs:
#   1. lint-and-test  — code quality checks & unit tests
#   2. deploy-dev     — sam build + deploy to dev stage (on push to develop)
#   3. deploy-prod    — sam build + deploy to prod stage (on push to main)
# ==========================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: "us-east-1"
  SAM_CLI_TELEMETRY: 0

# Prevent concurrent deployments to the same environment
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:

  # ── 1. Lint & Test ─────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings (non-blocking)
          flake8 src/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing || true
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── 2. Deploy to Dev ───────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.frontend_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: SAM build
        run: sam build --use-container

      - name: Deploy backend to dev
        id: deploy
        run: |
          # Always resolve the default VPC at runtime to avoid stale secret values
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters Name=isDefault,Values=true \
            --query 'Vpcs[0].VpcId' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "Using default VPC: ${VPC_ID}"

          sam deploy \
            --stack-name ewaste-optimizer-dev \
            --resolve-s3 \
            --resolve-image-repos \
            --region ${{ env.AWS_REGION }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              StageName=dev \
              BedrockModelId=${{ vars.BEDROCK_MODEL_ID || 'qwen.qwen3-30b-a3b' }} \
              BedrockRegion=${{ env.AWS_REGION }} \
              VpcId="${VPC_ID}" \
              DBUsername=${{ vars.DB_USERNAME || 'ewasteadmin' }} \
              DBPassword=${{ secrets.DB_PASSWORD_DEV }}

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ewaste-optimizer-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ewaste-optimizer-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' \
            --output text)
          CF_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ewaste-optimizer-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendDistributionId`].OutputValue' \
            --output text)
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name ewaste-optimizer-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "cf_dist_id=$CF_DIST_ID" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$FRONTEND_URL" >> "$GITHUB_OUTPUT"

      - name: Build React frontend
        working-directory: src/frontend
        env:
          VITE_BACKEND_URL: ${{ steps.deploy.outputs.api_url }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to S3 + invalidate CloudFront
        run: |
          aws s3 sync src/frontend/dist/ \
            s3://${{ steps.deploy.outputs.frontend_bucket }}/ \
            --delete --region ${{ env.AWS_REGION }}

          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.deploy.outputs.cf_dist_id }} \
            --paths "/*"

      - name: Upload model artifacts to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ewaste-optimizer-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`StorageBucketName`].OutputValue' \
            --output text)
          
          echo "Uploading model artifacts to s3://${BUCKET}/models/"
          aws s3 sync src/model_training/models/ "s3://${BUCKET}/models/" \
            --exclude "plots/*"

      - name: Smoke test
        run: |
          API_URL="${{ steps.deploy.outputs.api_url }}"
          echo "Testing health endpoint: ${API_URL}/api/health"

          # Retry up to 5 times with 10s delay to allow Lambda cold start
          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /tmp/health_body.json -w "%{http_code}" "${API_URL}/api/health" --max-time 30)
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"
            cat /tmp/health_body.json || true
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts (last HTTP $HTTP_CODE)"
          exit 1

      - name: Post-deployment summary
        run: |
          API_URL="${{ steps.deploy.outputs.api_url }}"
          FRONTEND_URL="${{ steps.deploy.outputs.frontend_url }}"
          echo "## Dev Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend URL | ${FRONTEND_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API URL | ${API_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Swagger Docs | ${API_URL}/docs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | ${{ env.AWS_REGION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bedrock Model | ${{ vars.BEDROCK_MODEL_ID || 'qwen.qwen3-30b-a3b' }} |" >> "$GITHUB_STEP_SUMMARY"

  # ── 3. Deploy to Production ────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.frontend_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: SAM build
        run: sam build --use-container

      - name: Deploy backend to production
        id: deploy
        run: |
          # Always resolve the default VPC at runtime to avoid stale secret values
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters Name=isDefault,Values=true \
            --query 'Vpcs[0].VpcId' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "Using default VPC: ${VPC_ID}"

          sam deploy \
            --stack-name ewaste-optimizer-prod \
            --resolve-s3 \
            --resolve-image-repos \
            --region ${{ env.AWS_REGION }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              StageName=prod \
              BedrockModelId=${{ vars.BEDROCK_MODEL_ID || 'qwen.qwen3-30b-a3b' }} \
              BedrockRegion=${{ env.AWS_REGION }} \
              VpcId="${VPC_ID}" \
              DBUsername=${{ vars.DB_USERNAME || 'ewasteadmin' }} \
              DBPassword=${{ secrets.DB_PASSWORD_PROD }}

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ewaste-optimizer-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ewaste-optimizer-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' \
            --output text)
          CF_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ewaste-optimizer-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendDistributionId`].OutputValue' \
            --output text)
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name ewaste-optimizer-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "cf_dist_id=$CF_DIST_ID" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$FRONTEND_URL" >> "$GITHUB_OUTPUT"

      - name: Build React frontend
        working-directory: src/frontend
        env:
          VITE_BACKEND_URL: ${{ steps.deploy.outputs.api_url }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to S3 + invalidate CloudFront
        run: |
          aws s3 sync src/frontend/dist/ \
            s3://${{ steps.deploy.outputs.frontend_bucket }}/ \
            --delete --region ${{ env.AWS_REGION }}

          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.deploy.outputs.cf_dist_id }} \
            --paths "/*"

      - name: Upload model artifacts to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ewaste-optimizer-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`StorageBucketName`].OutputValue' \
            --output text)
          
          echo "Uploading model artifacts to s3://${BUCKET}/models/"
          aws s3 sync src/model_training/models/ "s3://${BUCKET}/models/" \
            --exclude "plots/*"

      - name: Smoke test
        run: |
          API_URL="${{ steps.deploy.outputs.api_url }}"
          echo "Testing health endpoint: ${API_URL}/api/health"

          # Retry up to 5 times with 10s delay to allow Lambda cold start
          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /tmp/health_body.json -w "%{http_code}" "${API_URL}/api/health" --max-time 30)
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"
            cat /tmp/health_body.json || true
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts (last HTTP $HTTP_CODE)"
          exit 1

      - name: Post-deployment summary
        run: |
          API_URL="${{ steps.deploy.outputs.api_url }}"
          FRONTEND_URL="${{ steps.deploy.outputs.frontend_url }}"
          echo "## Production Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend URL | ${FRONTEND_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API URL | ${API_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Swagger Docs | ${API_URL}/docs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | ${{ env.AWS_REGION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bedrock Model | ${{ vars.BEDROCK_MODEL_ID || 'qwen.qwen3-30b-a3b' }} |" >> "$GITHUB_STEP_SUMMARY"
